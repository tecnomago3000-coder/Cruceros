<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver País Seleccionado</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            color: #0066cc;
            margin-bottom: 20px;
        }
        .resultado {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            padding: 20px;
            background: #e8f4f8;
            border-radius: 8px;
            margin-top: 20px;
        }
        button {
            margin-top: 20px;
            padding: 12px 30px;
            font-size: 16px;
            background: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #004a99;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>País Seleccionado para Postulación</h1>
        <div class="resultado" id="resultado">Cargando...</div>
        <button onclick="mostrarPais()">Actualizar</button>
    </div>

    <script>
        function mostrarPais() {
            const pais = localStorage.getItem('paisquepostula');
            const resultadoDiv = document.getElementById('resultado');
            
            if (pais) {
                // Mapear el valor a nombre completo del país
                const nombresPaises = {
                    'espana': 'España',
                    'canada': 'Canadá',
                    'estados-unidos': 'Estados Unidos',
                    'uruguay': 'Uruguay',
                    'brasil': 'Brasil'
                };
                
                const nombreCompleto = nombresPaises[pais] || pais;
                resultadoDiv.textContent = nombreCompleto;
                resultadoDiv.style.color = '#0066cc';
            } else {
                resultadoDiv.textContent = 'No hay país seleccionado';
                resultadoDiv.style.color = '#999';
            }
        }
        
        // Mostrar el país al cargar la página
        mostrarPais();
    </script>
</body>
</html>
